name: CI

on:
  push:
    branches: [main, ver3.0]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # ビルド時に参照される NEXT_PUBLIC_ 変数はダミー値で通す。
          # 本番ビルドは Vercel 側で実値が注入される。
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          # Admin SDK 用ダミー値（ビルド時に initializeApp が通ればよい。実呼び出しはない）
          FIREBASE_PROJECT_ID: dummy
          FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: dummy

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_E2E_AUTH_TOKEN: e2e-test-token
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          FIREBASE_PROJECT_ID: dummy
          FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: dummy

      - name: E2E smoke
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_E2E_AUTH_TOKEN: e2e-test-token
